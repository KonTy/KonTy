name: Profile Assets

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  # Animated contribution snake
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: KonTy
          outputs: |
            dist/snake.svg?palette=github-dark
            dist/snake.gif?color_snake=#A78BFA&color_dots=#0d1117,#2d1b69,#4c2b8a,#7c3aed,#a78bfa

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Profile summary cards (stats, languages, contribution timeline)
  summary-cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: KonTy
          BRANCH_NAME: main
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
