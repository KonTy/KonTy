name: Profile Assets

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  # Animated contribution snake
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: KonTy
          outputs: |
            dist/snake.svg?palette=github-dark
            dist/snake.gif?color_snake=#A78BFA&color_dots=#0d1117,#2d1b69,#4c2b8a,#7c3aed,#a78bfa

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist

  # Profile summary cards (stats, languages, contribution timeline)
  summary-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: KonTy
          BRANCH_NAME: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
