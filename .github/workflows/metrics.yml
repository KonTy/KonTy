name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Output file — committed back to the repo automatically
          filename: github-metrics.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Base settings
          base: header, activity, community, repositories
          config_timezone: Europe/Warsaw
          config_display: large
          retries: 3
          retries_delay: 300

          # ISO activity calendar (full year heatmap)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_colors: rainbow
          plugin_languages_limit: 6
          plugin_languages_indepth: yes

          # Recent activity feed
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_filter: push, release, fork, pr
          plugin_activity_days: 90

          # Featured repos
          plugin_repositories: yes
          plugin_repositories_featured: KonTy/grafium, microcore-app/microcore, KonTy/SilentPulse, smpl-os/smplos
          plugin_repositories_affiliations: owner, collaborator

          # Lines of code added/removed
          plugin_lines: yes
          plugin_lines_sections: base, repositories

          # Profile introduction
          plugin_introduction: yes
          plugin_introduction_title: yes
